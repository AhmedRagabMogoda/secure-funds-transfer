spring:
  application:
    name: transfer-app-backend

  # Active profile is set via environment variable or IDE run config
  # Dev  → SPRING_PROFILES_ACTIVE=dev
  # Prod → SPRING_PROFILES_ACTIVE=prod
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true
    clean-disabled: true

server:
  port: ${PORT:8080}

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION:900000}   # 15 minutes
      refresh-token:
        expiration: ${REFRESH_TOKEN_EXPIRATION:604800000}   # 7 days

logging:
  level:
    org.springframework.security: INFO
    com.transferapp: INFO