spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration-ms: ${JWT_EXPIRATION:86400000}

logging:
  level:
    org.springframework.security: INFO
    com.transferapp: INFO