version: "3.9"

# ============================================================
# Secure Funds Transfer — Docker Compose
#
# Services:
#   db       → PostgreSQL 16 database
#   backend  → Spring Boot REST API (port 8080)
#   frontend → Angular app served via Nginx (port 80)
#
# Usage:
#   docker compose up --build          # first run
#   docker compose up -d               # detached mode
#   docker compose down -v             # stop and remove volumes
# ============================================================

services:

  # ----------------------------------------------------------
  # PostgreSQL Database
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: transfer_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       transfer_db
      POSTGRES_USER:     ${DB_USERNAME:-transfer_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-transfer_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-transfer_user} -d transfer_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - transfer_network

  # ----------------------------------------------------------
  # Spring Boot Backend
  # ----------------------------------------------------------
  backend:
    build:
      context: ./transfer-app-backend
      dockerfile: Dockerfile
    container_name: transfer_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL:                    jdbc:postgresql://db:5432/transfer_db
      DB_USERNAME:               ${DB_USERNAME:-transfer_user}
      DB_PASSWORD:               ${DB_PASSWORD:-transfer_pass}
      JWT_SECRET:                ${JWT_SECRET:-bXlTdXBlclNlY3JldEtleUZvckpXVEF1dGhlbnRpY2F0aW9u}
      JWT_EXPIRATION:            ${JWT_EXPIRATION:-900000}
      REFRESH_TOKEN_EXPIRATION:  ${REFRESH_TOKEN_EXPIRATION:-604800000}
      SPRING_PROFILES_ACTIVE:    docker
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - transfer_network

  # ----------------------------------------------------------
  # Angular Frontend (Nginx)
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./transfer-app-frontend
      dockerfile: Dockerfile
    container_name: transfer_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - transfer_network

# ----------------------------------------------------------
# Volumes & Networks
# ----------------------------------------------------------
volumes:
  postgres_data:
    driver: local

networks:
  transfer_network:
    driver: bridge
